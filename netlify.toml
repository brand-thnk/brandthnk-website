[build]
  publish = "."
  command = ""
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[functions]
  node_bundler = "esbuild"

# Auto-publish settings
[context.production]
  publish = "."

[context.deploy-preview]
  publish = "."

# Redirects
[[redirects]]
  from = "/insights/*"
  to = "/focal/:splat"
  status = 301
