<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research | BrandThnk</title>
<meta name="description" content="Research and analysis from BrandThnk.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #000000;
    --white: #FFFFFF;
    --yellow: #FFEB3B;
    --offwhite: #F5F5F5;
    --gray: #666666;
    --light-gray: #CCCCCC;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Roboto Mono', monospace;
    background: var(--white);
    color: var(--black);
    font-size: 17px;
    line-height: 1.6;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 60px;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--light-gray);
  }

  .nav-logo {
    font-family: 'Roboto Slab', serif;
    font-weight: 700;
    font-size: 22px;
    color: var(--black);
    text-decoration: none;
  }

  .nav-links {
    display: flex;
    gap: 36px;
    list-style: none;
  }

  .nav-links a {
    font-size: 14px;
    font-weight: 400;
    color: var(--gray);
    text-decoration: none;
    transition: color 0.2s;
  }

  .nav-links a:hover { color: var(--black); }

  .nav-cta {
    background: var(--black);
    color: var(--white) !important;
    padding: 10px 22px;
    border-radius: 0;
    transition: all 0.2s !important;
  }

  .nav-cta:hover { background: var(--yellow) !important; color: var(--black) !important; }

  .mobile-menu-toggle {
    display: none;
    flex-direction: column;
    gap: 4px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px;
  }

  .mobile-menu-toggle span {
    width: 22px;
    height: 2px;
    background: var(--black);
    transition: all 0.3s ease;
    transform-origin: center;
  }

  .mobile-menu-toggle.active span:first-child { transform: rotate(45deg) translate(5px, 5px); }
  .mobile-menu-toggle.active span:nth-child(2) { opacity: 0; }
  .mobile-menu-toggle.active span:last-child { transform: rotate(-45deg) translate(7px, -6px); }

  /* MAIN */
  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 160px 60px 120px;
  }

  .page-header {
    text-align: center;
    margin-bottom: 100px;
  }

  .page-eyebrow {
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gray);
    margin-bottom: 24px;
  }

  .page-title {
    font-family: 'Roboto Slab', serif;
    font-size: clamp(48px, 6vw, 72px);
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 32px;
    color: var(--black);
    letter-spacing: -1px;
  }

  .page-description {
    font-size: 20px;
    color: var(--gray);
    max-width: 640px;
    margin: 0 auto;
    font-weight: 400;
    line-height: 1.6;
  }

  /* LIST VIEW */
  .content-list {
    display: flex;
    flex-direction: column;
    max-width: 900px;
    margin: 0 auto;
  }

  .content-item {
    display: block;
    padding: 36px 0;
    border-bottom: 1px solid var(--light-gray);
    text-decoration: none;
    color: inherit;
    transition: background 0.2s;
  }

  .content-item:hover .content-title { color: var(--gray); }

  .content-type {
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--gray);
    display: inline-block;
    margin-bottom: 8px;
  }

  .content-title {
    font-family: 'Roboto Slab', serif;
    font-size: clamp(20px, 2.5vw, 26px);
    font-weight: 700;
    line-height: 1.2;
    color: var(--black);
    transition: color 0.2s;
    margin-bottom: 8px;
  }

  .content-description {
    font-size: 15px;
    color: var(--gray);
    max-width: 620px;
    line-height: 1.6;
    margin-bottom: 12px;
  }

  .content-read {
    font-size: 13px;
    color: var(--black);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
    font-weight: 500;
    transition: gap 0.2s;
  }

  .content-read::after { content: '\2192'; }
  .content-item:hover .content-read { gap: 14px; }

  .empty-state {
    text-align: center;
    padding: 80px 0;
    color: var(--gray);
    font-size: 15px;
  }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .page-eyebrow { animation: fadeUp 0.6s ease both; }
  .page-title { animation: fadeUp 0.6s 0.1s ease both; }
  .page-description { animation: fadeUp 0.6s 0.2s ease both; }

  @media (max-width: 900px) {
    nav {
      padding: 18px 24px;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
    }

    .mobile-menu-toggle { display: flex; }

    .nav-links {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--white);
      border-top: 1px solid var(--light-gray);
      flex-direction: column;
      padding: 20px 24px;
      gap: 16px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .nav-links.active { display: flex; }

    .nav-links li { width: 100%; }

    .nav-links a {
      display: block;
      padding: 12px 0;
      font-size: 16px;
      border-bottom: 1px solid var(--light-gray);
    }

    .container { padding: 140px 24px 80px; }
    .page-header { margin-bottom: 60px; }
  }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">BrandThnk</a>
  <button class="mobile-menu-toggle" aria-label="Toggle mobile menu">
    <span></span>
    <span></span>
    <span></span>
  </button>
  <ul class="nav-links">
    <li><a href="/#offers">Work With Us</a></li>
    <li><a href="/library/">Our Toolkit</a></li>
    <li><a href="/book/">Read the Book</a></li>
    <li><a href="/about">About</a></li>
    <li><a href="https://calendar.app.google/ZoWdHFueshr6LQs17" class="nav-cta">Book a Call</a></li>
  </ul>
</nav>

<div class="container">
  <div class="page-header">
    <p class="page-eyebrow">Research</p>
    <h1 class="page-title">What we're finding.</h1>
    <p class="page-description">Analysis and insights from our research practice.</p>
  </div>

  <div class="content-list">
    <!-- Add research entries here. Each entry links to its static page. Example:
    <a href="/research/digital-onboarding/" class="content-item">
      <span class="content-type">Research</span>
      <h3 class="content-title">Digital Onboarding in Community Banking</h3>
      <p class="content-description">A competitive analysis of digital onboarding experiences across community banks.</p>
      <span class="content-read">Read</span>
    </a>
    -->
    <div class="empty-state">Research entries coming soon.</div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const toggle = document.querySelector('.mobile-menu-toggle');
  const navLinks = document.querySelector('.nav-links');

  if (toggle && navLinks) {
    toggle.addEventListener('click', function() {
      toggle.classList.toggle('active');
      navLinks.classList.toggle('active');
    });

    navLinks.addEventListener('click', function(e) {
      if (e.target.tagName === 'A') {
        toggle.classList.remove('active');
        navLinks.classList.remove('active');
      }
    });

    document.addEventListener('click', function(e) {
      if (!e.target.closest('nav')) {
        toggle.classList.remove('active');
        navLinks.classList.remove('active');
      }
    });
  }
});
</script>

</body>
</html>
