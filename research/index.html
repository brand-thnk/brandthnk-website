<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research | BrandThnk</title>
<meta name="description" content="Research and analysis from BrandThnk.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #000000;
    --white: #FFFFFF;
    --yellow: #FFEB3B;
    --offwhite: #F5F5F5;
    --gray: #666666;
    --light-gray: #CCCCCC;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Roboto Mono', monospace;
    background: var(--white);
    color: var(--black);
    font-size: 17px;
    line-height: 1.6;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 60px;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--light-gray);
  }

  .nav-logo {
    font-family: 'Roboto Slab', serif;
    font-weight: 700;
    font-size: 22px;
    color: var(--black);
    text-decoration: none;
  }

  .nav-links {
    display: flex;
    gap: 36px;
    list-style: none;
  }

  .nav-links a {
    font-size: 14px;
    font-weight: 400;
    color: var(--gray);
    text-decoration: none;
    transition: color 0.2s;
  }

  .nav-links a:hover { color: var(--black); }

  .nav-cta {
    background: var(--black);
    color: var(--white) !important;
    padding: 10px 22px;
    border-radius: 0;
    transition: all 0.2s !important;
  }

  .nav-cta:hover { background: var(--yellow) !important; color: var(--black) !important; }

  .mobile-menu-toggle {
    display: none;
    flex-direction: column;
    gap: 4px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px;
  }

  .mobile-menu-toggle span {
    width: 22px;
    height: 2px;
    background: var(--black);
    transition: all 0.3s ease;
    transform-origin: center;
  }

  .mobile-menu-toggle.active span:first-child { transform: rotate(45deg) translate(5px, 5px); }
  .mobile-menu-toggle.active span:nth-child(2) { opacity: 0; }
  .mobile-menu-toggle.active span:last-child { transform: rotate(-45deg) translate(7px, -6px); }

  /* MAIN */
  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 160px 60px 120px;
  }

  .page-header {
    text-align: center;
    margin-bottom: 100px;
  }

  .page-eyebrow {
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gray);
    margin-bottom: 24px;
  }

  .page-title {
    font-family: 'Roboto Slab', serif;
    font-size: clamp(48px, 6vw, 72px);
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 32px;
    color: var(--black);
    letter-spacing: -1px;
  }

  .page-description {
    font-size: 20px;
    color: var(--gray);
    max-width: 640px;
    margin: 0 auto;
    font-weight: 400;
    line-height: 1.6;
  }

  /* LIST VIEW */
  .content-list {
    display: flex;
    flex-direction: column;
    max-width: 900px;
    margin: 0 auto;
  }

  .content-item {
    display: block;
    padding: 36px 0;
    border-bottom: 1px solid var(--light-gray);
    text-decoration: none;
    color: inherit;
    transition: background 0.2s;
  }

  .content-item:hover .content-title { color: var(--gray); }

  .content-type {
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--gray);
    display: inline-block;
    margin-bottom: 8px;
  }

  .content-title {
    font-family: 'Roboto Slab', serif;
    font-size: clamp(20px, 2.5vw, 26px);
    font-weight: 700;
    line-height: 1.2;
    color: var(--black);
    transition: color 0.2s;
    margin-bottom: 8px;
  }

  .content-description {
    font-size: 15px;
    color: var(--gray);
    max-width: 620px;
    line-height: 1.6;
    margin-bottom: 12px;
  }

  .content-date {
    font-size: 12px;
    color: var(--light-gray);
  }

  .content-read {
    font-size: 13px;
    color: var(--black);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
    font-weight: 500;
    transition: gap 0.2s;
  }

  .content-read::after { content: '→'; }
  .content-item:hover .content-read { gap: 14px; }

  /* SINGLE VIEW */
  .article-container {
    max-width: 780px;
    margin: 0 auto;
    padding: 160px 60px 120px;
  }

  .article-back {
    font-size: 13px;
    color: var(--gray);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 48px;
    transition: gap 0.2s;
  }

  .article-back:hover { gap: 14px; color: var(--black); }
  .article-back::before { content: '←'; }

  .article-meta {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gray);
    margin-bottom: 16px;
  }

  .article-title {
    font-family: 'Roboto Slab', serif;
    font-size: clamp(32px, 4vw, 48px);
    font-weight: 700;
    line-height: 1.15;
    color: var(--black);
    letter-spacing: -1px;
    margin-bottom: 16px;
  }

  .article-summary {
    font-size: 18px;
    color: var(--gray);
    line-height: 1.6;
    margin-bottom: 48px;
    padding-bottom: 48px;
    border-bottom: 2px solid var(--black);
  }

  .article-content {
    font-size: 17px;
    line-height: 1.8;
    color: var(--black);
  }

  .article-content h1 {
    font-family: 'Roboto Slab', serif;
    font-size: 32px;
    font-weight: 700;
    margin: 48px 0 20px;
    line-height: 1.2;
  }

  .article-content h2 {
    font-family: 'Roboto Slab', serif;
    font-size: 26px;
    font-weight: 700;
    margin: 40px 0 16px;
    line-height: 1.2;
  }

  .article-content h3 {
    font-family: 'Roboto Slab', serif;
    font-size: 20px;
    font-weight: 700;
    margin: 32px 0 12px;
    line-height: 1.3;
  }

  .article-content p { margin-bottom: 20px; }

  .article-content ul, .article-content ol {
    margin: 0 0 20px 24px;
  }

  .article-content li { margin-bottom: 8px; }

  .article-content blockquote {
    border-left: 3px solid var(--yellow);
    padding: 12px 24px;
    margin: 24px 0;
    color: var(--gray);
    font-style: italic;
  }

  .article-content strong { font-weight: 700; }
  .article-content em { font-style: italic; }

  .article-content a {
    color: var(--black);
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  .article-content a:hover { color: var(--gray); }

  .article-content hr {
    border: none;
    border-top: 1px solid var(--light-gray);
    margin: 40px 0;
  }

  .article-content code {
    background: var(--offwhite);
    padding: 2px 6px;
    font-size: 15px;
  }

  .article-content pre {
    background: var(--offwhite);
    padding: 20px;
    overflow-x: auto;
    margin: 24px 0;
    font-size: 14px;
    line-height: 1.5;
  }

  .article-content pre code {
    background: none;
    padding: 0;
  }

  .article-content table {
    width: 100%;
    border-collapse: collapse;
    margin: 24px 0;
    font-size: 15px;
  }

  .article-content th, .article-content td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--light-gray);
    text-align: left;
  }

  .article-content th {
    font-weight: 700;
    border-bottom: 2px solid var(--black);
  }

  .empty-state {
    text-align: center;
    padding: 80px 0;
    color: var(--gray);
    font-size: 15px;
  }

  .loading {
    text-align: center;
    padding: 80px 0;
    color: var(--gray);
    font-size: 15px;
  }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .page-eyebrow { animation: fadeUp 0.6s ease both; }
  .page-title { animation: fadeUp 0.6s 0.1s ease both; }
  .page-description { animation: fadeUp 0.6s 0.2s ease both; }

  @media (max-width: 900px) {
    nav {
      padding: 18px 24px;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
    }

    .mobile-menu-toggle { display: flex; }

    .nav-links {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--white);
      border-top: 1px solid var(--light-gray);
      flex-direction: column;
      padding: 20px 24px;
      gap: 16px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .nav-links.active { display: flex; }

    .nav-links li { width: 100%; }

    .nav-links a {
      display: block;
      padding: 12px 0;
      font-size: 16px;
      border-bottom: 1px solid var(--light-gray);
    }

    .container { padding: 140px 24px 80px; }
    .article-container { padding: 140px 24px 80px; }
    .page-header { margin-bottom: 60px; }
  }
</style>
</head>
<body>

<!-- NAV (not in main site nav — standalone) -->
<nav>
  <a href="/" class="nav-logo">BrandThnk</a>
  <button class="mobile-menu-toggle" aria-label="Toggle mobile menu">
    <span></span>
    <span></span>
    <span></span>
  </button>
  <ul class="nav-links">
    <li><a href="/#offers">Work With Us</a></li>
    <li><a href="/library/">Our Toolkit</a></li>
    <li><a href="/book/">Read the Book</a></li>
    <li><a href="/about">About</a></li>
    <li><a href="https://calendar.app.google/ZoWdHFueshr6LQs17" class="nav-cta">Book a Call</a></li>
  </ul>
</nav>

<!-- LIST VIEW -->
<div class="container" id="list-view">
  <div class="page-header">
    <p class="page-eyebrow">Research</p>
    <h1 class="page-title">What we're finding.</h1>
    <p class="page-description">Analysis and insights from our research practice.</p>
  </div>
  <div class="content-list" id="research-list">
    <div class="loading">Loading...</div>
  </div>
</div>

<!-- SINGLE VIEW -->
<div class="article-container" id="single-view" style="display: none;">
  <a href="/research/" class="article-back">All Research</a>
  <div class="article-meta" id="article-meta"></div>
  <h1 class="article-title" id="article-title"></h1>
  <p class="article-summary" id="article-summary"></p>
  <div class="article-content" id="article-content"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const slug = params.get('slug');

if (slug) {
  loadSingle(slug);
} else {
  loadList();
}

async function loadList() {
  const container = document.getElementById('research-list');
  try {
    const res = await fetch('/.netlify/functions/research');
    const items = await res.json();

    if (!items.length) {
      container.innerHTML = '<div class="empty-state">No research published yet.</div>';
      return;
    }

    container.innerHTML = items.map(item => {
      const date = new Date(item.publishedAt).toLocaleDateString('en-US', {
        year: 'numeric', month: 'long', day: 'numeric'
      });
      return `
        <a href="/research/?slug=${item.slug}" class="content-item">
          <span class="content-type">Research</span>
          <h3 class="content-title">${escapeHtml(item.title)}</h3>
          ${item.summary ? `<p class="content-description">${escapeHtml(item.summary)}</p>` : ''}
          <span class="content-date">${date}</span>
          <span class="content-read">Read</span>
        </a>
      `;
    }).join('');
  } catch {
    container.innerHTML = '<div class="empty-state">Could not load research.</div>';
  }
}

async function loadSingle(slug) {
  document.getElementById('list-view').style.display = 'none';
  document.getElementById('single-view').style.display = 'block';

  try {
    const res = await fetch(`/.netlify/functions/research?slug=${encodeURIComponent(slug)}`);
    if (!res.ok) {
      document.getElementById('article-title').textContent = 'Not found';
      document.getElementById('article-content').innerHTML = '<p>This research entry could not be found.</p>';
      return;
    }

    const entry = await res.json();
    const date = new Date(entry.publishedAt).toLocaleDateString('en-US', {
      year: 'numeric', month: 'long', day: 'numeric'
    });

    document.title = `${entry.title} | Research | BrandThnk`;
    document.getElementById('article-meta').textContent = `Research · ${date}`;
    document.getElementById('article-title').textContent = entry.title;

    if (entry.summary) {
      document.getElementById('article-summary').textContent = entry.summary;
    } else {
      document.getElementById('article-summary').style.display = 'none';
    }

    document.getElementById('article-content').innerHTML = renderMarkdown(entry.content);
  } catch {
    document.getElementById('article-title').textContent = 'Error';
    document.getElementById('article-content').innerHTML = '<p>Could not load this research entry.</p>';
  }
}

function renderMarkdown(text) {
  // Simple markdown-to-HTML renderer
  let html = text;

  // Escape HTML first
  html = html.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

  // Code blocks (``` ... ```)
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    return `<pre><code>${code.trim()}</code></pre>`;
  });

  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Headings
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // Horizontal rules
  html = html.replace(/^---+$/gm, '<hr>');

  // Bold and italic
  html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Links
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');

  // Blockquotes
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  // Merge consecutive blockquotes
  html = html.replace(/<\/blockquote>\n<blockquote>/g, '\n');

  // Tables
  html = html.replace(/^(\|.+\|)\n(\|[-| :]+\|)\n((?:\|.+\|\n?)+)/gm, (_, header, sep, rows) => {
    const ths = header.split('|').filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join('');
    const trs = rows.trim().split('\n').map(row => {
      const tds = row.split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('');
      return `<tr>${tds}</tr>`;
    }).join('');
    return `<table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
  });

  // Unordered lists
  html = html.replace(/^(\s*[-*] .+(?:\n\s*[-*] .+)*)/gm, (match) => {
    const items = match.split('\n').map(line => {
      const text = line.replace(/^\s*[-*] /, '');
      return `<li>${text}</li>`;
    }).join('');
    return `<ul>${items}</ul>`;
  });

  // Ordered lists
  html = html.replace(/^(\s*\d+\. .+(?:\n\s*\d+\. .+)*)/gm, (match) => {
    const items = match.split('\n').map(line => {
      const text = line.replace(/^\s*\d+\. /, '');
      return `<li>${text}</li>`;
    }).join('');
    return `<ol>${items}</ol>`;
  });

  // Paragraphs (lines that aren't already wrapped in block elements)
  html = html.replace(/^(?!<[houpbt]|<li|<block|<hr|<pre|<table)(.+)$/gm, '<p>$1</p>');

  // Clean up empty paragraphs and extra newlines
  html = html.replace(/<p>\s*<\/p>/g, '');
  html = html.replace(/\n{3,}/g, '\n\n');

  return html;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// Mobile menu toggle
document.addEventListener('DOMContentLoaded', function() {
  const toggle = document.querySelector('.mobile-menu-toggle');
  const navLinks = document.querySelector('.nav-links');

  if (toggle && navLinks) {
    toggle.addEventListener('click', function() {
      toggle.classList.toggle('active');
      navLinks.classList.toggle('active');
    });

    navLinks.addEventListener('click', function(e) {
      if (e.target.tagName === 'A') {
        toggle.classList.remove('active');
        navLinks.classList.remove('active');
      }
    });

    document.addEventListener('click', function(e) {
      if (!e.target.closest('nav')) {
        toggle.classList.remove('active');
        navLinks.classList.remove('active');
      }
    });
  }
});
</script>

</body>
</html>
