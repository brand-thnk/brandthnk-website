<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Synthesis Debug</title>
<style>
  body { font-family: 'Roboto Mono', monospace; margin: 20px; }
  .debug-output { background: #f5f5f5; padding: 15px; margin: 10px 0; border-radius: 4px; white-space: pre-wrap; font-family: monospace; max-height: 400px; overflow-y: auto; }
  .test-btn { padding: 10px 20px; background: #FFEB3B; color: #000; border: 2px solid #000; cursor: pointer; margin: 5px; }
  .test-btn:hover { background: #000; color: #FFEB3B; }
</style>
</head>
<body>

<h1>🔧 Test Synthesis Step Debug</h1>

<button class="test-btn" onclick="testAutomatedFlow()">Test Complete Flow</button>
<button class="test-btn" onclick="clearOutput()">Clear Output</button>

<div id="debug-output" class="debug-output">Click "Test Complete Flow" to run automated test...</div>

<script>
// Redirect console.log to our debug output
const originalLog = console.log;
const originalError = console.error;
const debugOutput = document.getElementById('debug-output');

function logToDebug(level, ...args) {
  const timestamp = new Date().toISOString().split('T')[1].split('.')[0];
  const message = `[${timestamp}] ${level.toUpperCase()}: ${args.map(arg =>
    typeof arg === 'object' ? JSON.stringify(arg, null, 2) : String(arg)
  ).join(' ')}`;

  debugOutput.textContent += message + '\n';
  debugOutput.scrollTop = debugOutput.scrollHeight;
}

console.log = (...args) => {
  originalLog(...args);
  logToDebug('log', ...args);
};

console.error = (...args) => {
  originalError(...args);
  logToDebug('error', ...args);
};

function clearOutput() {
  debugOutput.textContent = 'Output cleared...\n';
}

function testAutomatedFlow() {
  clearOutput();
  console.log('Starting automated test of synthesis step...');

  // Open the main insights page in a new window/tab
  console.log('Opening insights page...');
  const insightsWindow = window.open('/insights/run.html', '_blank');

  if (!insightsWindow) {
    console.error('Failed to open insights page - popup blocked?');
    return;
  }

  console.log('Insights page opened. Manual test steps:');
  console.log('1. Select "Message Testing" module');
  console.log('2. Fill in email and business parameters');
  console.log('3. Click "Run Research Interviews"');
  console.log('4. Watch the browser console for debugging output');
  console.log('5. Observe if synthesis step completes');

  setTimeout(() => {
    console.log('Test instructions sent. Check the opened window and browser console.');
  }, 1000);
}

// Test synthesis logic directly
function testSynthesisLogic() {
  console.log('Testing synthesis step logic...');

  // Simulate the conditions
  const selectedPersonas = ['b1-bank-head-digital-transformation', 'b2-enterprise-cio-cto'];
  const totalSteps = selectedPersonas.length + 1; // 3 steps total

  console.log('Selected personas:', selectedPersonas);
  console.log('Total steps:', totalSteps);

  // Test the step progression logic
  for (let currentStep = 0; currentStep < totalSteps + 1; currentStep++) {
    const isSynthesisStep = currentStep === selectedPersonas.length;
    const isComplete = currentStep >= totalSteps;

    console.log(`Step ${currentStep}: synthesis=${isSynthesisStep}, complete=${isComplete}`);

    if (isComplete) {
      console.log('Should generate report and complete');
      break;
    }
  }
}

// Run basic logic test on page load
window.onload = function() {
  console.log('Synthesis debug page loaded');
  testSynthesisLogic();
}

</script>

</body>
</html>
