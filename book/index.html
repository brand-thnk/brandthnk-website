<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Think Like a Brand, Not a Bank (2nd Edition) | BrandThnk</title>
<meta name="description" content="The definitive guide to brand strategy for financial services. Available now with free toolkit.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #000000;
    --white: #FFFFFF;
    --yellow: #FFEB3B;
    --offwhite: #F5F5F5;
    --gray: #666666;
    --light-gray: #CCCCCC;
    --card-bg: #FFFFFF;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Roboto Mono', monospace;
    background: var(--white);
    color: var(--black);
    font-size: 17px;
    line-height: 1.6;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 60px;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--light-gray);
  }

  .nav-logo {
    font-family: 'Roboto Slab', serif;
    font-weight: 700;
    font-size: 22px;
    color: var(--black);
    text-decoration: none;
  }

  .nav-back {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--gray);
    text-decoration: none;
    font-size: 14px;
    transition: color 0.2s;
  }

  .nav-back:hover { color: var(--black); }

  /* TOOLKIT SECTION */
  .toolkit-section {
    background: var(--yellow);
    padding: 80px 60px;
    margin-top: 100px;
  }

  .toolkit-inner {
    max-width: 1000px;
    margin: 0 auto;
    text-align: center;
  }

  .toolkit-section h2 {
    font-family: 'Roboto Slab', serif;
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 20px;
    color: var(--black);
  }

  .toolkit-section p {
    font-size: 17px;
    color: var(--black);
    margin-bottom: 32px;
    opacity: 0.8;
  }

  .btn-black {
    background: var(--black);
    color: var(--white);
    padding: 16px 40px;
    font-size: 15px;
    font-weight: 400;
    border: none;
    border-radius: 0;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    transition: all 0.2s;
    font-family: 'Roboto Mono', monospace;
  }

  .btn-black:hover { background: var(--white); color: var(--black); }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="/" class="nav-logo">BrandThnk</a>
  <a href="/" class="nav-back">← Back to BrandThnk</a>
</nav>

<!-- TOOLKIT CTA -->
<div class="toolkit-section">
  <div class="toolkit-inner">
    <h2>Included Free: TLAB2 Toolkit</h2>
    <p>Get the Brand Operating System Toolkit with five complete frameworks you can use immediately. Download includes worksheets, templates, and implementation guides.</p>
    <a href="/toolkit/" class="btn-black">Download Free Toolkit</a>
  </div>
</div>

</body>
</html>
