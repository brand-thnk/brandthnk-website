<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horicon Bank - Customer Persona Explorer (Updated with Interview Insights)</title>

    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<body>
    <div id="root"></div>

              'check-circle': '✓',
              'x-circle': '✗',

              'users': '👥',
              'dollar-sign': '$',
              'target': '🎯',
              'message-circle': '💬',
              'quote': '"'
            };

          };

            'wealthy-achievers': {
              name: 'Wealthy Achievers',
              code: 'M2',
              ageRange: '55-74',
              tagline: 'Established affluence, seeking legacy and control',
              priority: 'High',
              color: '#2C5F7C',
              segment: {
                code: '10',
                name: 'Leasing Luxury',
                description: 'Affluent segment within Wealthy Achievers with high deposit potential'
              },
              overview: {
                size: 'Significant current customer base',
                opportunity: 'High deposit growth potential, especially in southeast Wisconsin',
                behavioral: 'Strong cross-sell adoption once acquired, high checking penetration'
              },
              validated: {
                confirmed: [
                  'Data confirms segment exists and matches wealthy achievers profile (Chrissy)',
                  'Strong with established customers in legacy markets (Erik, Kerry)',
                  'Trust department connection validated for this age group (Erik)',
                  'Responds to educational vs sales approach (confirmed by glider program performance)'
                ],
                challenged: [
                  'Milwaukee market seniors are different demographic - more diverse, access to more services, many not originally from area (Kerry)',
                  'Acquisition still struggles even in strong segment areas (Chrissy)',
                  'Not currently using "persona" language at all - identify by life events instead (Kerry)'

              },
              stakeholderQuotes: [
                { person: 'Kerry Murphy', role: 'Customer Relations (19+ years frontline)', quote: 'People don\'t know Horicon Bank is here. Milwaukee seniors are different - more diversity, more access to services. Many retirees not originally from the area.' },
                { person: 'Brenda Hetebrueg', role: 'Regional Manager, Southern Region (frontline)', quote: 'One teller generated 8 referrals in 1.5 weeks just by asking discovery questions. The southern region reached 25% of Q1 goal - a major improvement from where we were.' },
                { person: 'Cassie Voight', role: 'Operations Officer (23+ years)', quote: 'Frontline and back office staff wouldn\'t recognize persona language. We operate in survival mode rather than strategic mode.' }
              ],
              performanceData: [
                { metric: 'Glider Journey (55+)', value: '0% failure rate', source: 'Danielle - Total Expert metrics' },
                { metric: 'E-statement Conversion', value: '56%', source: 'Danielle - Total Expert metrics' },
                { metric: 'Senior Seminar Attendance', value: '100 avg attendees', source: 'Pre-engagement assessment' },
                { metric: 'Cross-sell Performance', value: 'Strong in established markets', source: 'Chrissy - data analysis' }
              ],
              operationalReality: [
                'Frontline doesn\'t use persona language - they identify by demographics and life events: "55 or better gets certain products" (Kerry)',
                'Trust seminars working but limited reach in Milwaukee/Fox Valley markets (Erik)',
                'Different senior demographics between Milwaukee and legacy markets require different approaches (Kerry)',
                'Strong community presence but weak at proactive sales (Kerry)'

              goals: [
                'Preserve and transfer wealth to next generation',
                'Access trusted expertise for estate planning and trust services',
                'Simplify complex financial lives without losing control',
                'Support community causes aligned with values',

                'Difficulty finding advisors who actually understand their goals'

              recommendations: [
                'Kerry\'s 2026 focus: Expand senior customers in Milwaukee County through senior center symposiums, bingo sponsorship, assisted living partnerships',

                'Separate Milwaukee senior strategy from legacy market approach due to demographic differences (Kerry)'

              color: '#C17C3B',

                code: '14',
                name: 'School Daze',
                description: 'Families managing education expenses alongside home, career growth'

              overview: {

                opportunity: 'High lifetime value, mortgage entry point, Bank at Work potential',

              ],
              performanceData: [
                { metric: 'Banking at Work', value: 'Modified program, pilot phase', source: 'Erik - recent changes' },
                { metric: 'Website Audit', value: 'Planned for modernization', source: 'Natalie - upcoming initiative' },
                { metric: 'Digital Ads Performance', value: 'Strong in Milwaukee/Wawatosa', source: 'Natalie' }

              operationalReality: [
                'Banking hours don\'t match their life - work 8-5, bank 9-4 (inferred from Kerry\'s comments)',
                'Transaction volume down, but service complexity up - branches handle problems not routine (Kerry)',
                'Need mobile-first approach for this segment (Natalie)',
                'Event-heavy focus without follow-up playbooks or systematic post-event nurturing (Danielle)'

                'Balance competing priorities: home, education, retirement',

              performanceData: [

                { metric: 'Current Performance', value: 'Needs improvement', source: 'Natalie' },
                { metric: 'Brand Awareness', value: 'Low in Milwaukee market', source: 'Erik' }

              operationalReality: [
                'Digital ads performing well but focus on impressions not clicks/conversions (Erik)',
                'No billboards in Milwaukee market for brand building (Erik)',
                'Events planned without systematic follow-up (Danielle)',
                'Website complexity issues for online banking (Kerry)'

              goals: [
                'Establish credit and build financial foundation',
                'Find banking that doesn\'t penalize them for starting out',
                'Access modern tools (mobile, instant transfers, budgeting)',
                'Get guidance without condescension',
                'Align with brands that reflect their values'

                'Banks that feel like their parents\' generation',
                'Being treated like they don\'t matter because balances are small',
                'Hidden fees and outdated technology',
                'Lack of educational resources that aren\'t patronizing',
                'Confusion about new vs old banking processes (Kerry)'

              recommendations: [
                'Natalie\'s campaign concept: Food truck + ITM demonstration events to showcase digital capabilities',
                'Prioritize digital-first strategy (Natalie)',
                'Geographic targeting for people moving to Milwaukee (Natalie)',
                'Banking at Work as employer connection point (Erik)',
                'Develop youth checking e-statement journey (Danielle: ready to launch, awaiting approval)'

          const currentPersona = personas[selectedPersona];

          return (
            <div className="min-h-screen bg-gradient-to-br from-slate-50 to-blue-50">
              {/* Header */}
              <div className="bg-white border-b border-slate-200 shadow-sm">
                <div className="max-w-7xl mx-auto px-6 py-6">
                  <div className="flex items-start justify-between">
                    <div>
                      <h1 className="text-2xl font-bold text-slate-900">Horicon Bank Customer Personas</h1>
                      <p className="text-sm text-slate-600 mt-1">Updated with stakeholder interview insights — March 2026</p>
                      <div className="mt-3 flex items-center gap-4 text-xs">
                        <div className="flex items-center gap-2">
                          <Icon name="check-circle" className="text-green-600" />
                          <span className="text-slate-600">5 of 8 stakeholder interviews completed</span>
                        </div>
                        <div className="flex items-center gap-2">
                          <Icon name="message-circle" className="text-blue-600" />
                          <span className="text-slate-600">Real quotes & validation data integrated</span>
                        </div>
                      </div>
                    </div>
                    <div className="text-right">
                      <div className="text-xs font-semibold text-slate-600 uppercase tracking-wide mb-1">Interviews Conducted</div>
                      <div className="space-y-1 text-xs text-slate-700">
                        <div className="flex items-center gap-1 justify-end"><span className="text-green-600">✓</span> Chrissy Oelke (Data Analytics) — Feb 25</div>
                        <div className="flex items-center gap-1 justify-end"><span className="text-green-600">✓</span> Kerry Murphy (Customer Relations) — Mar 2</div>
                        <div className="flex items-center gap-1 justify-end"><span className="text-green-600">✓</span> Danielle Schraufnagel (Total Expert) — Mar 4</div>
                        <div className="flex items-center gap-1 justify-end"><span className="text-green-600">✓</span> Natalie Kollin (Marketing) — Mar 4</div>
                        <div className="flex items-center gap-1 justify-end"><span className="text-green-600">✓</span> Erik W. (Business Development) — Mar 9</div>
                      </div>
                      <div className="text-xs font-semibold text-slate-600 uppercase tracking-wide mb-1 mt-3">Upcoming</div>
                      <div className="space-y-1 text-xs text-slate-700">
                        <div className="flex items-center gap-1 justify-end"><span className="text-blue-600">○</span> Cassie Voight (Operations/Sr. Mgmt) — Mar 20</div>
                        <div className="flex items-center gap-1 justify-end"><span className="text-blue-600">○</span> Stephanie K. Albers (AVP, Northern Regional Mgr) — Mar 23</div>
                        <div className="flex items-center gap-1 justify-end"><span className="text-amber-600">⏳</span> Brenda Heteberg (Regional Mgr, Southern) — Unscheduled</div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <div className="max-w-7xl mx-auto px-6 py-8">

                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-4 sticky top-6">
                      <div className="flex items-center gap-2 mb-4">
                        <Icon name="users" className="text-slate-600" />
                        <h3 className="font-semibold text-slate-900 text-sm uppercase tracking-wide">Priority Retail Personas</h3>
                      </div>
                      <div className="space-y-1">
                        {Object.entries(personas).map(([key, persona]) => (
                          <button
                            key={key}
                            onClick={() => setSelectedPersona(key)}
                            className={`w-full text-left px-3 py-3 rounded-lg transition-all ${
                              selectedPersona === key
                                ? 'bg-blue-50 text-blue-900 font-medium border border-blue-200'
                                : 'text-slate-700 hover:bg-slate-50'
                            }`}
                          >
                            <div className="flex items-center justify-between mb-1">
                              <div className="text-sm font-medium">{persona.name}</div>
                              <div className={`w-2 h-2 rounded-full ${persona.priority === 'High' ? 'bg-green-500' : 'bg-amber-500'}`} />
                            </div>
                            <div className="text-xs text-slate-500">{persona.code} • Ages {persona.ageRange}</div>
                            {persona.validated && (
                              <div className="mt-2 flex gap-2">
                                <span className="inline-flex items-center gap-1 text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded">
                                  <Icon name="check-circle" className="text-xs" />
                                  {persona.validated.confirmed.length}
                                </span>
                                <span className="inline-flex items-center gap-1 text-xs bg-amber-100 text-amber-700 px-2 py-0.5 rounded">

                              </div>

                          </button>

                      </div>

                      <div className="flex items-start justify-between mb-4">
                        <div>
                          <div className="flex items-center gap-3 mb-2">
                            <h2 className="text-3xl font-bold text-slate-900">{currentPersona.name}</h2>
                            <span className={`px-3 py-1 rounded-full text-xs font-medium ${
                              currentPersona.priority === 'High' 
                                ? 'bg-green-100 text-green-800' 
                                : 'bg-amber-100 text-amber-800'
                            }`}>
                              {currentPersona.priority} Priority
                            </span>
                          </div>
                          <p className="text-lg text-slate-600 mb-4">{currentPersona.tagline}</p>
                          {currentPersona.segment && (
                            <div className="inline-flex items-center gap-2 px-3 py-1 bg-blue-50 border border-blue-200 rounded-lg">
                              <Icon name="target" className="text-blue-600" />
                              <span className="text-sm text-blue-900">
                                <strong>Segment {currentPersona.segment.code}:</strong> {currentPersona.segment.name}
                              </span>
                            </div>
                          )}
                        </div>
                      </div>

                      {/* Overview Cards */}
                      <div className="grid grid-cols-3 gap-4">
                        <div className="p-4 bg-slate-50 rounded-lg border border-slate-200">

                          <div className="text-xs font-semibold text-blue-700 uppercase tracking-wide mb-1">Behavioral</div>
                          <div className="text-sm text-blue-900">{currentPersona.overview.behavioral}</div>
                        </div>
                      </div>
                    </div>

                    {/* Tabs */}
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200">
                      <div className="border-b border-slate-200">
                        <div className="flex gap-1 p-2">
                          {['overview', 'validation', 'quotes', 'recommendations'].map((tab) => (
                            <button
                              key={tab}
                              onClick={() => setActiveTab(tab)}
                              className={`px-4 py-2 rounded-lg text-sm font-medium transition-all ${
                                activeTab === tab
                                  ? 'bg-blue-50 text-blue-900'
                                  : 'text-slate-600 hover:bg-slate-50'
                              }`}
                            >
                              {tab === 'overview' && 'Goals & Frustrations'}
                              {tab === 'validation' && 'Interview Validation'}
                              {tab === 'quotes' && 'Stakeholder Quotes'}
                              {tab === 'recommendations' && 'Next Steps'}
                            </button>
                          ))}

                      </div>

                              </h3>

                                  </div>
                                ))}
                              </div>
                            </div>

                            {/* Frustrations */}

                                <Icon name="alert-circle" className="text-red-600 text-xl" />

                              </h3>
                              <div className="space-y-2">

                                    <div key={idx} className="flex items-start gap-3 p-3 bg-amber-50 rounded-lg border border-amber-100">

                                      <p className="text-sm text-slate-800">{item}</p>
                                    </div>
                                  ))}
                                </div>
                              </div>
                            )}
                          </div>
                        )}

                        {activeTab === 'validation' && currentPersona.validated && (
                          <div className="space-y-6">
                            {/* Confirmed */}
                            <div>
                              <h3 className="text-lg font-semibold text-slate-900 mb-3 flex items-center gap-2">
                                <Icon name="check-circle" className="text-green-600 text-xl" />
                                Confirmed by Interviews
                              </h3>
                              <div className="space-y-2">
                                {currentPersona.validated.confirmed.map((item, idx) => (
                                  <div key={idx} className="flex items-start gap-3 p-4 bg-green-50 rounded-lg border border-green-200">
                                    <Icon name="check-circle" className="text-green-600 text-xl flex-shrink-0" />
                                    <p className="text-sm text-slate-800">{item}</p>

                            <div className="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-4">
                              <p className="text-sm text-blue-900">
                                <strong>Note:</strong> These are direct quotes from frontline employee interviews conducted February-April 2026. They represent the operational reality and customer-facing experience of staff who work directly with these personas daily.
                              </p>
                            </div>
                            {currentPersona.stakeholderQuotes.map((item, idx) => (
                              <div key={idx} className="bg-white rounded-lg border border-slate-200 p-5">
                                <div className="flex items-start gap-4">
                                  <div className="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center flex-shrink-0">
                                    <span className="text-blue-700 font-bold text-lg">{item.person[0]}</span>
                                  </div>
                                  <div className="flex-1">
                                    <div className="flex items-center gap-2 mb-2">
                                      <span className="font-semibold text-slate-900">{item.person}</span>
                                      <span className="text-xs text-slate-500">•</span>
                                      <span className="text-sm text-slate-600">{item.role}</span>
                                    </div>
                                    <div className="relative">
                                      <Icon name="quote" className="absolute -left-2 -top-1 text-slate-300 text-2xl" />
                                      <p className="text-sm text-slate-700 italic pl-4">{item.quote}</p>
                                    </div>
                                  </div>
                                </div>
                              </div>
                            ))}
                          </div>
                        )}

                        {activeTab === 'recommendations' && currentPersona.recommendations && (
                          <div className="space-y-4">
                            <div className="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-4">
                              <p className="text-sm text-blue-900">
                                <strong>These recommendations come directly from stakeholder interviews.</strong> They reflect what people closest to the work believe would make the biggest impact for this persona.
                              </p>
                            </div>
                            {currentPersona.recommendations.map((rec, idx) => (
                              <div key={idx} className="flex items-start gap-3 p-4 bg-green-50 rounded-lg border border-green-200">
                                <div className="w-6 h-6 rounded-full bg-green-600 text-white flex items-center justify-center flex-shrink-0 text-xs font-bold">
                                  {idx + 1}
                                </div>
                                <p className="text-sm text-slate-800">{rec}</p>
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    </div>

                    {/* Footer Note */}
                    <div className="mt-6 p-4 bg-slate-100 border border-slate-200 rounded-lg">
                      <p className="text-sm text-slate-700">
                        <strong>Data sources:</strong> This persona explorer integrates insights from 5 completed stakeholder interviews (Chrissy Oelke, Danielle Schraufnagel, Kerry Murphy, Natalie Kollin, Erik W.), Total Expert platform metrics, Bancography behavioral analysis, and AnalyzerIQ segmentation data. 3 interviews remaining: Cassie Voight (Mar 20), Stephanie K. Albers (Mar 23), Brenda Heteberg (unscheduled). Validated = confirmed by multiple sources. Challenged = contradicted by interview findings. Last updated: March 19, 2026.
                      </p>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          );
        };

        ReactDOM.render(<PersonaExplorer />, document.getElementById('root'));
    </script>
</body>
</html>
